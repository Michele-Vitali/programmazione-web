<body class="light-mode">
    <header class="header">
        <div class="theme-mode-container-dummy">
            <i class="fa-solid fa-circle-half-stroke"></i>
        </div>
        <div>Unifon</div>
        <div class="theme-mode-container">
            <i class="fa-solid fa-circle-half-stroke"></i>
        </div>
    </header>
    <navbar class="navbar">
        <ul class="navbar-list">
            <li><a class="paragraph active" href="#">Stipula contratto</a></li>

        <div class="centering-content">
            <p class="introduction">Inserisci questi dati per stipulare un nuovo contratto con Unifon</p>
            <form action="stipulate.php" method="POST">
                <div class="type-container">
                    <label class="form-label" for="type-select">Tipo di contratto:</label>
                    <select name="type" class="type-select" id="type-select" required>
                        <option value="" disabled selected>Selezione un opzione...</option>
                        <option value="ricarica">Ricarica</option>
                        <option value="consumo">Consumo</option>
                    </select>
                </div>
                <div class="optional-container">
                    <p class="startup-request">&nbsp;</p>
                    <div class="quantity-container">
                        <input type="number" name="quantity" class="quantity-input" min="0" value="0">
                        <span class="quantity-unit"></span>
                    </div>
                </div>
                <button type="submit" class="submit-button">Crea SIM</button>
            </form>
        </div>
    </section>
